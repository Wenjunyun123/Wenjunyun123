<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Dario.Y — AI Operations Console</title>
  <desc id="desc">An original industrial control-panel header for an AI frontend engineer and agent systems builder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b0d"/>
      <stop offset="0.58" stop-color="#0c1417"/>
      <stop offset="1" stop-color="#111d20"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6b35"/>
      <stop offset="0.56" stop-color="#ff9f43"/>
      <stop offset="1" stop-color="#55d6be"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#26363b" stroke-width="1" opacity="0.34"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="17" fill="none" stroke="#31464c" stroke-width="2"/>
  <rect x="18" y="18" width="1164" height="324" rx="10" fill="url(#grid)" stroke="#1c2b2f"/>
  <rect x="18" y="18" width="1164" height="5" rx="2.5" fill="url(#signal)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="52" y="62" fill="#55d6be" font-size="13" letter-spacing="3">OPS CONSOLE / 424758400 / CN-SH</text>
    <text x="52" y="135" fill="#eef4f1" font-size="68" font-weight="700" letter-spacing="2">DARIO.Y</text>
    <rect x="52" y="156" width="91" height="3" fill="#ff6b35"/>
    <text x="52" y="196" fill="#ff8a5b" font-size="20" font-weight="700" letter-spacing="3">AI FRONTEND ENGINEER</text>
    <text x="52" y="229" fill="#8ca2a7" font-size="15" letter-spacing="1.5">AGENT SYSTEMS · PRODUCT INTERFACES · AUTOMATION</text>

    <g transform="translate(760 58)">
      <rect width="382" height="190" rx="8" fill="#0a1114" stroke="#2a3e43"/>
      <text x="22" y="30" fill="#70888e" font-size="12" letter-spacing="2">RUNTIME STATUS</text>
      <line x1="22" y1="43" x2="360" y2="43" stroke="#25363a"/>

      <circle cx="30" cy="70" r="5" fill="#55d6be" filter="url(#glow)"/>
      <text x="48" y="75" fill="#8ca2a7" font-size="12">MODE</text>
      <text x="340" y="75" fill="#eef4f1" font-size="13" text-anchor="end">BUILD / SHIP</text>

      <circle cx="30" cy="108" r="5" fill="#ff6b35" filter="url(#glow)"/>
      <text x="48" y="113" fill="#8ca2a7" font-size="12">FOCUS</text>
      <text x="340" y="113" fill="#eef4f1" font-size="13" text-anchor="end">HUMAN ↔ AI</text>

      <circle cx="30" cy="146" r="5" fill="#ffb454" filter="url(#glow)"/>
      <text x="48" y="151" fill="#8ca2a7" font-size="12">OUTPUT</text>
      <text x="340" y="151" fill="#eef4f1" font-size="13" text-anchor="end">USEFUL SYSTEMS</text>

      <text x="22" y="177" fill="#52676c" font-size="10" letter-spacing="1.5">NO DEMO THEATRE / OBSERVABLE BY DEFAULT</text>
    </g>

    <g transform="translate(52 286)">
      <rect width="1090" height="34" rx="6" fill="#0a1114" stroke="#24363a"/>
      <text x="18" y="22" fill="#55d6be" font-size="11" letter-spacing="1.5">● CODEX ONLINE</text>
      <text x="205" y="22" fill="#d5dfdc" font-size="11" letter-spacing="1.5">◆ CLAUDE CODE READY</text>
      <text x="438" y="22" fill="#d5dfdc" font-size="11" letter-spacing="1.5">◇ OPENCODE SYNC</text>
      <text x="1072" y="22" fill="#ff8a5b" font-size="11" font-weight="700" text-anchor="end" letter-spacing="2">SYSTEMS, NOT DEMOS.</text>
    </g>
  </g>

  <path d="M705 45v220" stroke="#1f3034" stroke-dasharray="4 7"/>
  <path d="M716 45v220" stroke="#172428"/>
</svg>
